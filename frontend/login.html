<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión | Las Magnolias</title>

    <link rel="stylesheet" href="css/style.css">
    <script src="https://kit.fontawesome.com/f7d5cff221.js" crossorigin="anonymous"></script>
</head>
<body>

    <!-- HEADER -->
    <header>
        <h1>Las Magnolias</h1>
        <nav>
            <ul>
                <li><a href="index.html">🛍️ Inicio</a></li>
                <li><a href="carrito.html">🛒 Carrito</a></li>
                <li><a href="registro.html">📝 Registrarse</a></li>
                <li id="btn-cerrar-sesion" style="display: none;">
                <button id="logout-btn" class="btn-cerrar">Cerrar Sesión</button> </li>
            </ul>

        </nav>
    </header>

    <!-- MAIN -->
    <main class="contenedor-login">
        <h2>Iniciar Sesión</h2>

        <form id="login-form" class="form-login">
            <label for="login-email">Correo electrónico</label>
            <input
                type="email"
                id="login-email"
                placeholder="ejemplo@mail.com"
                required
            >

            <label for="login-password">Contraseña</label>
            <input
                type="password"
                id="login-password"
                placeholder="********"
                required
            >

            <button type="submit" class="btn-login">
                Ingresar
            </button>
        </form>

        <p class="texto-registro">
            ¿No tenés cuenta?
            <a href="registro.html">Registrate acá</a>
        </p>
    </main>

    <!-- FOOTER -->
    <footer>
        <p>&copy; 2025 Las Magnolias. Todos los derechos reservados.</p>
    </footer>

    <!-- SCRIPTS -->
    <script src="js/login.js"></script>
    <script src="js/auth-check.js"></script>

</body>
</html>
