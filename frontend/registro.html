<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro | Vida Plena</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://kit.fontawesome.com/f7d5cff221.js" crossorigin="anonymous"></script>
</head>
<body>

    <!-- HEADER -->
    <header>
        <h1>Las Magnolias</h1>
        <nav>
            <ul>
                <li><a href="index.html">🛍️ Inicio</a></li>
                <li><a href="login.html">🔐 Iniciar Sesión</a></li>
                <li><a href="carrito.html">🛒 Carrito</a></li>
            </ul>
        </nav>
    </header>

    <!-- MAIN -->
    <main class="contenedor-registro">
        <h2>Crear Cuenta</h2>

        <form id="registro-form" class="form-registro">

            <label for="reg-nombre">Nombre</label>
            <input
                type="text"
                id="reg-nombre"
                placeholder="Tu nombre"
                required
            >

            <label for="reg-apellido">Apellido</label>
            <input
                type="text"
                id="reg-apellido"
                placeholder="Tu apellido"
                required
            >

            <label for="reg-email">Correo electrónico</label>
            <input
                type="email"
                id="reg-email"
                placeholder="ejemplo@mail.com"
                required
            >

            <label for="reg-password">Contraseña</label>
            <input
                type="password"
                id="reg-password"
                placeholder="********"
                required
            >

            <button type="submit" class="btn-registro">
                Registrarse
            </button>
        </form>

        <p class="texto-login">
            ¿Ya tenés cuenta?
            <a href="login.html">Iniciar sesión</a>
        </p>
    </main>

    <!-- FOOTER -->
    <footer>
        <p>&copy; 2025 Las Magnolias. Todos los derechos reservados.</p>
    </footer>

    <!-- SCRIPTS -->
   <script src="js/registro.js"></script>

    <script src="js/auth.js"></script>

</body>
</html>
